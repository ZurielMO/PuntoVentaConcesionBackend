name: Backend CI

on:
  pull_request:
    branches:
      - master

  push:
    branches:
      - develop
      - master

jobs:
  verify:
    name: Verify Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          cd functions
          npm ci

      - name: Run tests
        run: |
          cd functions
          npm test -- --passWithNoTests

      - name: Build
        run: |
          cd functions
          npm run build
